seed: 42

data:
  image_size: 224
  batch_size: 32
  workers: 2

watermark:
  key_env: WFR_GUARD_KEY
  repetitions: 5
  match_threshold: 0.80

features:
  backbone: resnet18
  projection_dim: 128
  distance_quantile: 0.95

training:
  epochs: 20
  learning_rate: 0.001
  weight_decay: 0.0001
  validation_split: 0.20

defense:
  watermark_weight: 0.55
  feature_weight: 0.45
  decision_threshold: 0.50

